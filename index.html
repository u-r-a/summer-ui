<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summer · Personal User Interface</title>
  <meta name="description" content="Summer PUI — a personal user interface." />
  <link rel="stylesheet" href="style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <h1>Summer<span class="dot">.</span></h1>
      <p class="subheading">Your guide to the perfect season.</p>
    </header>

    <!-- Locked state: only the title (above) and the sign-in button are shown -->
    <section id="gate-locked" class="signin" aria-label="Sign in">
      <div id="gsi-button"></div>
      <p class="gate__note" id="gate-note"></p>
    </section>

    <!-- Unlocked state: the personal UI, visible only after sign-in -->
    <div id="gate-unlocked" hidden>
      <div class="gate__who">
        <img id="gate-avatar" class="gate__avatar" alt="" width="40" height="40" />
        <div>
          <strong id="gate-name"></strong>
          <span class="gate__email" id="gate-email"></span>
        </div>
        <button class="gate__signout" id="gate-signout" type="button">Sign out</button>
      </div>

      <section class="cards" aria-label="Quick links">
        <a class="card" href="#" data-label="Notes">
          <span class="card__icon">✺</span>
          <span class="card__title">Notes</span>
          <span class="card__sub">Capture a thought</span>
        </a>
        <a class="card" href="#" data-label="Links">
          <span class="card__icon">↗</span>
          <span class="card__title">Links</span>
          <span class="card__sub">Your shortcuts</span>
        </a>
        <a class="card" href="#" data-label="Today">
          <span class="card__icon">◴</span>
          <span class="card__title">Today</span>
          <span class="card__sub" id="clock">—</span>
        </a>
      </section>

      <footer class="foot">
        <span>Built with ♥ for summer.</span>
      </footer>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
